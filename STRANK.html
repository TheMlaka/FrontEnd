<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Študenti</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            text-align: center;
        }

        h1 {
            margin: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: white;
            width: 220px;
            margin: 10px;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            margin: 15px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<h1>Zoznam študentov</h1>

<button onclick="loadStudents()">Načítať študentov</button>

<div class="container" id="students"></div>

<script>
    const API_URL = "https://themlaka.github.io/BackEnd/"; // 🔥 TU DÁŠ SVOJ BACKEND

    async function loadStudents() {
        const container = document.getElementById("students");
        container.innerHTML = "Načítavam...";

        try {
            const response = await fetch(API_URL);
            const data = await response.json();

            container.innerHTML = "";

            data.students.forEach(student => {
                const div = document.createElement("div");
                div.className = "card";

                div.innerHTML = `
                    <img src="${student.image}">
                    <h3>${student.name} ${student.surname}</h3>
                    <p><b>Prezývka:</b> ${student.nickname || "-"}</p>
                `;

                container.appendChild(div);
            });

        } catch (error) {
            container.innerHTML = "❌ Nepodarilo sa načítať dáta";
            console.error(error);
        }
    }
</script>

</body>
</html>
